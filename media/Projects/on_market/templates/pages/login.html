{% extends "base.html" %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-100 dark:bg-gray-900">

  <div class="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-lg w-full max-w-md">

    <!-- Title -->
    <h2 class="text-2xl font-bold text-center text-gray-800 dark:text-white mb-6">
      Welcome Back 👋
    </h2>

    <!-- Error Message -->
    {% if form.errors %}
      <div class="bg-red-100 text-red-600 p-3 rounded mb-4 text-sm">
        Invalid username or password
      </div>
    {% endif %}

    <!-- Form -->
    <form method="POST" class="space-y-5">
      {% csrf_token %}

      <!-- Username -->
      <div>
        <label class="block text-gray-700 dark:text-gray-300 mb-1">
          Username
        </label>
        <input type="text" name="username" required
          class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none dark:bg-gray-700 dark:border-gray-600 dark:text-white">
      </div>

      <!-- Password -->
      <div>
        <label class="block text-gray-700 dark:text-gray-300 mb-1">
          Password

{% endblock %}
