{% extends 'base.html' %}
{% block content %}

<div class="flex items-center justify-center min-h-screen bg-gray-100 dark:bg-gray-900">

  <div class="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-lg w-full max-w-md">

    <h2 class="text-2xl font-bold text-center mb-6 text-gray-800 dark:text-white">
      Login
    </h2>

    {% if error %}
      <p class="text-red-500 text-center mb-4">{{ error }}</p>
    {% endif %}

    <form method="POST">
      {% csrf_token %}

      <input type="text" name="username" placeholder="Username"
        class="w-full mb-4 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">

      <input type="password" name="password" placeholder="Password"
        class="w-full mb-6 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">

      <button type="submit"
        class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 transition">
        Login
      </button>
    </form>

  </div>

</div>

{% endblock %}
