{% extends "base/base.html" %}

{% block content %}

<div class="min-h-screen flex items-center justify-center bg-gray-100 dark:bg-gray-900">

    <div class="bg-white dark:bg-gray-800 shadow-xl rounded-xl p-8 w-full max-w-md">

        <!-- Title -->
        <h2 class="text-2xl font-bold text-center text-gray-800 dark:text-white mb-6">
            Login to OnMarket
        </h2>

        <!-- Error Message -->
        <p id="error" class="text-red-500 text-sm text-center mb-4 hidden"></p>

        <!-- Form -->
        <form id="loginForm" class="space-y-4">

            <input type="text" id="username" placeholder="Username"
                class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">

            <input type="password" id="password" placeholder="Password"
                class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">

            <button type="submit"
                class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 transition">
                Login
            </button>

        </form>

    </div>

</div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();

    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    fetch("/api/login/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCSRFToken()
        },
        body: JSON.stringify({
            username: username,
            password: password
        })
    })
    .then(res => res.json())
    .then(data => {
        if(data.status === "success"){
            window.location.href = "/";
        } else {
            document.getElementById("error").innerText = data.message;
            document.getElementById("error").classList.remove("hidden");
        }
    });
});

// CSRF helper
function getCSRFToken() {
    return document.cookie.split('; ')
        .find(row => row.startsWith('csrftoken='))
        ?.split('=')[1];
}
</script>

{% endblock %}
