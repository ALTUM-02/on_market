{% extends 'base/base.html' %}

{% block title %}Home{% endblock %}

{% block content %}
<h1 class="text-2xl mb-4">Products</h1>
<form method="GET" class="mb-6">
  <div class="flex items-center bg-white dark:bg-gray-800 rounded-lg shadow px-4 py-2">

    <input type="text" 
           name="q"
           value="{{ query|default:'' }}"
           placeholder="Search products..."
           class="w-full bg-transparent focus:outline-none text-gray-700 dark:text-white">

    <button type="submit" 
            class="ml-2 bg-blue-500 text-white px-4 py-1 rounded-lg hover:bg-blue-600">
      Search
    </button>

  </div>
</form>

{% if products %}

<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    {% for product in products %}
    <div class="bg-white dark:bg-gray-800 p-4 rounded shadow hover:scale-105 transition">

        <img src="{{ product.image.url }}" alt="{{ product.name }}" class="w-full h-40 object-cover rounded">

        <h2 class="font-bold mt-2">{{ product.name }}</h2>
        <p>${{ product.price }}</p>

        <a href="{% url 'product_detail' product.id %}" 
           

{% endblock %}
