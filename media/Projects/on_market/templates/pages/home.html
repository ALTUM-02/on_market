{% extends 'base/base.html' %}

{% block title %}Home{% endblock %}

{% block content %}
<h1 class="text-2xl mb-4">Products</h1>
<form method="GET" class="mb-6">
  <div class="flex items-center bg-white dark:bg-gray-800 rounded-lg shadow px-4 py-2">

    <input type="text" 
           name="q"
           value="{{ query|default:'' }}"
           placeholder="Search products..."
           class="w-full bg-transparent focus:outline-none text-gray-700 dark:text-white">

    <button type="submit" 
            class="ml-2 bg-blue-500 text-white px-4 py-1 rounded-lg hover:bg-blue-600">
      Search
    </button>

  </div>
</form>

<div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition relative">

    <!-- Image -->
    {% if product.image %}
        <img src="{{ product.image.url }}" class="w-full h-48 object-cover">
    {% else %}
        <div class="w-full h-48 flex items-center justify-center bg-gray-200 text-gray-500">
            No Image
        </div>
    {% endif %}

    <!-- Content -->
    <div class="p-4">
        <h2 class="text-lg font-bold">{{ product.name }}</h2>
        <p class="text-gray-600 mb-3">${{ product.price }}</p>

        <!-- Buttons -->
        <div class="flex justify-between items-center">

            <!-- Edit -->
            <a href="{% url 'edit_product' product.id %}" 
               class="bg-blue-500 text-white px-3 py-1 rounded-lg text-sm hover:bg-blue-600 transition">
                ✏️ Edit
            </a>

            <!-- Delete -->
            <form action="{% url 'delete_product' product.id %}" method="POST">
                {% csrf_token %}
                <button type="submit" 
                        class="bg-red-500 text-white px-3 py-1 rounded-lg text-sm hover:bg-red-600 transition"
                        onclick="return confirm('Are you sure you want to delete this product?')">
                    🗑 Delete
                </button>
            </form>

        </div>
    </div>

</div>
          

{% endblock %}
