{% extends 'base/base.html' %}

{% block content %}

<div class="min-h-screen flex items-center justify-center bg-gray-100 dark:bg-gray-900">

    <div class="bg-white dark:bg-gray-800 shadow-xl rounded-xl p-8 w-full max-w-md">

        <h2 class="text-2xl font-bold text-center text-gray-800 dark:text-white mb-6">
            Create Account
        </h2>

        <!-- Message -->
        <p id="message" class="text-center text-sm mb-4 hidden"></p>

        <form id="registerForm" class="space-y-4">

            <input type="text" id="username" placeholder="Username"
                class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">

            <input type="email" id="email" placeholder="Email"
                class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">

            <input type="password" id="password" placeholder="Password"
                class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">

            <button type="submit"
                class="w-full bg-green-500 text-white py-2 rounded-lg hover:bg-green-600 transition">
                Register
            </button>

        </form>

        <p class="text-center text-gray-500 mt-4">
            Already have an account?
            <a href="/login/" class="text-blue-500 hover:underline">Login</a>
        </p>

    </div>

</div>

<script>
document.getElementById("registerForm").addEventListener("submit", function(e){
    e.preventDefault();

    const username = document.getElementById("username").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    fetch("/api/register/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCSRFToken()
        },
        body: JSON.stringify({
            username: username,
            email: email,
            password: password
        })
    })
    .then(res => res.json())
    .then(data => {
        const msg = document.getElementById("message");
        msg.classList.remove("hidden");

        if(data.status === "success"){
            msg.className = "text-green-500 text-center mb-4";
            msg.innerText = data.message;

            setTimeout(() => {
                window.location.href = "/login/";
            }, 1500);
        } else {
            msg.className = "text-red-500 text-center mb-4";
            msg.innerText = data.message;
        }
    });
});

// CSRF helper
function getCSRFToken() {
    return document.cookie.split('; ')
        .find(row => row.startsWith('csrftoken='))
        ?.split('=')[1];
}
</script>

{% endblock %}
