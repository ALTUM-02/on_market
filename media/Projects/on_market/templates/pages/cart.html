{% extends 'base/base.html' %}

{% block content %}

<div class="max-w-5xl mx-auto p-6">

    <h2 class="text-2xl font-bold mb-6">Your Cart 🛒</h2>

    <div id="cartItems" class="space-y-4"></div>

    <!-- Total -->
    <div class="mt-6 text-right">
        <h3 class="text-xl font-bold">Total: $<span id="totalPrice">0</span></h3>
    </div>

</div>

<script>
fetch("/api/cart/")
.then(res => res.json())
.then(data => {
    const container = document.getElementById("cartItems");
    let total = 0;

    if(data.items.length === 0){
        container.innerHTML = "<p class='text-gray-500'>Cart is empty 😢</p>";
        return;
    }

    data.items.forEach(item => {
        total += item.total;

        container.innerHTML += `
            <div class="flex justify-between items-center bg-white p-4 rounded shadow">

                <div>
                    <h3 class="font-semibold">${item.name}</h3>
                    <p class="text-gray-500">$${item.price} × ${item.quantity}</p>
                </div>

                <div class="flex items-center space-x-3">

                    <span class="font-bold">$${item.total}</span>

                    <button onclick="removeItem(${item.id})"
                        class="text-red-500 hover:text-red-700">
                        Remove
                    </button>

                </div>

            </div>
        `;
    });

    document.getElementById("totalPrice").innerText = total;
});

function removeItem(id){
    fetch(`/api/cart/remove/${id}/`)
    .then(() => location.reload());
}
</script>

{% endblock %}
